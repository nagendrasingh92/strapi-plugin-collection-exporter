<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4945FF"/>
      <stop offset="100%" style="stop-color:#7B79FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="600" height="600" rx="80" fill="url(#bg)"/>
  <!-- Document icon shape -->
  <rect x="170" y="100" width="260" height="320" rx="20" fill="white" opacity="0.15"/>
  <rect x="190" y="120" width="240" height="280" rx="14" fill="white" opacity="0.25"/>
  <!-- Download arrow -->
  <path d="M300 200 L300 330" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <path d="M250 290 L300 340 L350 290" stroke="white" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Base line -->
  <path d="M230 370 L370 370" stroke="white" stroke-width="24" stroke-linecap="round"/>
  <!-- Text -->
  <text x="300" y="490" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="white" letter-spacing="2">CSV</text>
  <text x="300" y="550" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="72" fill="white" opacity="0.8" letter-spacing="2">EXCEL</text>
</svg>
